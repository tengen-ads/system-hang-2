<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Telegram Landing Page</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow:hidden;
}

/* Background Glow */

body::before{
content:"";
position:absolute;
top:-200px;
left:50%;
transform:translateX(-50%);
width:700px;
height:700px;
background:radial-gradient(circle,#ffd00033,transparent 70%);
z-index:-1;
}

/* Main Card */

.card{
width:100%;
max-width:420px;
background:#111;
border:1px solid rgba(255,215,0,.4);
border-radius:35px;
padding:35px 25px;
text-align:center;
box-shadow:0 0 60px rgba(255,215,0,.08);
}

/* Verified Badge */

.badge{
display:inline-flex;
align-items:center;
gap:10px;
background:#1d1a10;
padding:12px 22px;
border-radius:50px;
color:#FFD54A;
font-weight:700;
font-size:15px;
margin-bottom:35px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
background:#00ffd0;
box-shadow:0 0 12px #00ffd0;
}

/* Heading */

h1{
font-size:46px;
font-weight:800;
color:#fff;
line-height:1.1;
}

.gold{
color:#FFC400;
display:block;
margin-top:8px;
}

/* Subtitle */

.subtitle{
margin-top:28px;
color:#a5a5a5;
font-size:20px;
font-weight:400;
}

.subtitle span{
color:#FFC400;
margin-right:8px;
}

.join-btn{
margin-top:45px;
display:flex;
justify-content:center;
align-items:center;
gap:15px;
background:linear-gradient(180deg,#FFE26A,#FFC400);
padding:22px;
border-radius:22px;
text-decoration:none;
font-size:26px;
font-weight:800;
color:#111;
transition:.3s;
box-shadow:0 15px 35px rgba(255,196,0,.35);
}

.join-btn:hover{
transform:translateY(-4px);
box-shadow:0 20px 45px rgba(255,196,0,.5);
}

.join-btn img{
width:42px;
height:42px;
}

.footer{
margin-top:38px;
font-size:15px;
color:#777;
}

.footer span{
color:#FFC400;
margin-right:6px;
}

@media(max-width:480px){

.card{
padding:28px 18px;
}

h1{
font-size:36px;
}

.subtitle{
font-size:18px;
}

.join-btn{
font-size:21px;
padding:18px;
}

.join-btn img{
width:34px;
height:34px;
}

}

</style>
</head>
<body>

<div class="card">

<div class="badge">
<div class="dot"></div>
Verified VIP Channel
</div>

<h1>
UNDER 2 LEVEL
<span class="gold">VIP GROUP</span>
</h1>

<p class="subtitle">
<span>⚡</span>Daily profit signals available
</p>

<a href="https://t.me/YOUR_CHANNEL_USERNAME" class="join-btn" target="_blank">

<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">

<span>JOIN TELEGRAM NOW</span>

</a>

<div class="footer">
<span>🔒</span>Encrypted Connection Secure
</div>

</div>

</body>
</html>
